<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vibe-node-editor/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Node Editor</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <script type="module" crossorigin src="/vibe-node-editor/assets/index-V0SR9Jh-.js"></script>
    <link rel="stylesheet" crossorigin href="/vibe-node-editor/assets/index-BHU2c2UY.css">
  </head>
  <body>
    <div id="app">
      <header class="topbar" id="topbar">
        <div class="brand">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__name">VIBE<span>.</span>NODE</span>
        </div>

        <div class="topbar__group" id="topbar-actions"></div>

        <div class="topbar__spacer"></div>

        <div class="topbar__meta">
          <span class="selected-count" id="selected-count">
            Selected nodes: <strong>0</strong>
          </span>
          <button class="btn btn--icon" id="theme-toggle" aria-label="Toggle color theme" title="Toggle theme">
            <svg class="icon-sun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="8" cy="8" r="3" />
              <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.3 3.3l1.4 1.4M11.3 11.3l1.4 1.4M3.3 12.7l1.4-1.4M11.3 4.7l1.4-1.4" />
            </svg>
            <svg class="icon-moon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
              <path d="M13 9.5A5.5 5.5 0 0 1 6.5 3a5.5 5.5 0 1 0 6.5 6.5z" />
            </svg>
          </button>
        </div>
      </header>

      <aside class="inspector" id="inspector">
        <h2 class="inspector__title">Inspector</h2>
        <div class="inspector__body" id="inspector-body">
          <p class="inspector__empty">No selection</p>
        </div>
      </aside>

      <main class="canvas-wrap" id="canvas-wrap">
        <canvas id="graph-canvas"></canvas>
        <div class="canvas-status" id="canvas-status">
          <span class="dot"></span>
          <span>Live</span>
        </div>
      </main>

      <div id="toast-host" class="toast-host" aria-live="polite"></div>
    </div>

    <div id="mobile-warning" class="mobile-warning">
      Vibe Node Editor is desktop-only. Please use a larger screen.
    </div>

  </body>
</html>
