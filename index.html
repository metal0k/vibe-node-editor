<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vibe Node Editor</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar" id="topbar">
        <div class="topbar__group" id="topbar-actions"></div>
        <div class="topbar__spacer"></div>
        <div class="topbar__group" id="topbar-meta">
          <span class="selected-count" id="selected-count">Selected nodes: 0</span>
          <button class="btn btn--icon" id="theme-toggle" aria-label="Toggle theme">🌙</button>
        </div>
      </header>

      <aside class="inspector" id="inspector">
        <h2 class="inspector__title">Inspector</h2>
        <div class="inspector__body" id="inspector-body">
          <p class="inspector__empty">Select a node to inspect</p>
        </div>
      </aside>

      <main class="canvas-wrap" id="canvas-wrap">
        <canvas id="graph-canvas"></canvas>
      </main>

      <div id="toast-host" class="toast-host" aria-live="polite"></div>

      <div id="mobile-warning" class="mobile-warning" hidden>
        Vibe Node Editor is desktop-only. Please use a larger screen.
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
